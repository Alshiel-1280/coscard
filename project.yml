name: CosCard
options:
  bundleIdPrefix: jp.coscard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""

targets:
  CosCard:
    type: application
    platform: iOS
    sources:
      - path: CosCard
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.coscard.CosCard
        INFOPLIST_FILE: CosCard/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: MultipeerConnectivity.framework

  CosCardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CosCardTests
    dependencies:
      - target: CosCard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CosCard.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CosCard"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  CosCard:
    build:
      targets:
        CosCard: all
    test:
      targets:
        - CosCardTests
